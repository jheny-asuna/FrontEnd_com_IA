<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Alternar modo claro e escuro" class="theme-toggle">🌙</button>
    <main>
        <section class="profile-selection" aria-label="Seleção de Perfil">
            <h1>Quem está assistindo?</h1>
            <ul class="profiles" role="list">
                <li role="listitem">
                    <article class="profile">
                        <figure>
                            <img src="/assets/perfil_1.png" alt="Imagem de homem em cartoon estilo Tim Burton." >
                            <figcaption>Léo</figcaption>
                        </figure>
                    </article>
                </li>
                <li role="listitem">
                    <article class="profile">
                        <figure>
                            <img src="/assets/perfil_2.png" alt="Imagem de mulher em cartoon estilo Tim Burton.">
                            <figcaption>Jheny</figcaption>
                        </figure>
                    </article>
                </li>
                <li role="listitem">
                    <article class="profile">
                        <figure>
                            <img src="/assets/perfil_3.png" alt="Imagem de homem em cartoon estilo Tim Burton.">
                            <figcaption>Jhay</figcaption>
                        </figure>
                    </article>
                </li>
                <li role="listitem">
                    <article class="profile">
                        <figure>
                            <img src="/assets/perfil_4.png" alt="Imagem de mulher em cartoon estilo Tim Burton.">
                            <figcaption>Thay</figcaption>
                        </figure>
                    </article>
                </li>
            </ul>
        </section>
    </main>
    <script src="tema.js"></script>
</body>
</html>
